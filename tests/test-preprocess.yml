name: Test preprocess README to Home
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up local bare git repo to act as wiki
        run: |
          mkdir -p /tmp/fakewiki-preprocess
          git init --bare /tmp/fakewiki-preprocess/testrepo.wiki.git
          git clone /tmp/fakewiki-preprocess/testrepo.wiki.git /tmp/fakewiki-preprocess-work
          cd /tmp/fakewiki-preprocess-work
          git config user.email "test@test.com"
          git config user.name "Test"
          echo "# Home" > Home.md
          git add Home.md
          git commit -m "Initial commit"
          git push origin HEAD:master
          cd -

      - name: Mock gh CLI to avoid auth issues
        run: |
          mkdir -p /tmp/mock-bin-preprocess
          cat > /tmp/mock-bin-preprocess/gh << 'EOF'
          #!/bin/sh
          # Mock gh - just succeed silently
          exit 0
          EOF
          chmod +x /tmp/mock-bin-preprocess/gh
          echo "/tmp/mock-bin-preprocess" >> $GITHUB_PATH

      - name: Create wiki content with README.md
        run: |
          mkdir -p wiki-docs
          echo "# Welcome" > wiki-docs/README.md
          echo "This is the main page." >> wiki-docs/README.md
          echo "# Other Page" > wiki-docs/Other.md
          echo "See [README](README.md) for details." >> wiki-docs/Other.md

      - id: action
        uses: .
        with:
          strategy: clone
          path: wiki-docs
          dry-run: "true"
          preprocess: "true"
          token: "dummy-token"
          repository: testrepo
          github-server-url: "file:///tmp/fakewiki-preprocess"

      - name: Assert wiki_url output is set
        env:
          WIKI_URL: ${{ steps.action.outputs.wiki_url }}
        run: |
          echo "wiki_url: $WIKI_URL"
          if [ -z "$WIKI_URL" ]; then
            echo "FAIL: wiki_url output is empty"
            exit 1
          fi
          echo "PASS: wiki_url is set to $WIKI_URL"

      - name: Assert wiki_url contains /wiki
        env:
          WIKI_URL: ${{ steps.action.outputs.wiki_url }}
        run: |
          echo "wiki_url: $WIKI_URL"
          if [[ "$WIKI_URL" != *"/wiki"* ]]; then
            echo "FAIL: wiki_url does not contain '/wiki'"
            exit 1
          fi
          echo "PASS: wiki_url contains /wiki"
